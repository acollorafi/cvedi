<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden Leaf Menù</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="styles/style.css">

</head>

<body>

    <!-- Per effetto liquido -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;" aria-hidden="true">
        <filter id="liquidFilter">
            <feTurbulence type="turbulence" baseFrequency="0.006" numOctaves="2" result="turbulence" />
            <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="50" xChannelSelector="R"
                yChannelSelector="G" />
        </filter>
    </svg>


    <!-- Navbar -->
    <nav class="navbar navbar-expand-md sticky-top bg-body-tertiary">
        <div class="container-xxl">
            <!-- con container-fluid ha max-width 100%, con container e basta invece ha diversi breakpoint -->
            <a class="navbar-brand" href="#">
                <img src="images/logo/Logo_EL.svg" alt="Eden Leaf" width="60" height="60">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="glass-effect collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav d-flex justify-content-center mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">HOME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">RISTORANTE</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">MENU</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">INFO</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">SOSTENIBILITA</a>
                    </li>
                </ul>
            </div>

            <button class="glass-effect btn btn-custom-primary" type="button">PRENOTA</button>
        </div>
    </nav>


    <!-- Sezione 1: Hero + Anteprima menù -->
    <div id="menu-s1">

        <!-- Hero -->
        <div class="hero-section container section">
            <h1>MENÙ</h1>
        </div>

    </div>    
        <!--  Toggle menù + anteprima piatti -->
        <section class="menu-intro text-center mt-5">
            <div class="menu-s2">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-12 col-lg-7">
                            <h3 class="section-subtitle mb-3">I nostri menù</h3>
                            
                            <p class="intro-text">
                                Hai esigenze particolari? Scopri i nostri menù dedicati!<br>
                                Clicca sul menù che ti interessa per visualizzare i piatti che contiene.
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-center gap-2 my-4">
                <button class="btn btn-outline-info rounded-pill px-4">Sintetico</button>
                <button class="btn btn-info rounded-pill px-4 active">Neon-free</button>
                <button class="btn btn-outline-info rounded-pill px-4">BioAI</button>
            </div>

        </section>

    






</body>

</html>
