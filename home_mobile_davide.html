<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eden Leaf Home Mobile</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        /* 1. Impostiamo il corpo pagina */
        body {
            background-color: #1D2824; /* Sfondo bianco che combacia con la sfumatura */
            margin: 0;
        }

        /* 2. Navbar trasparente che sta SOPRA l'immagine */
        .navbar-custom {
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            padding-top: 15px;
            padding-bottom: 15px;
            transition: background 0.3s;
        }

        /* 3. La Hero Section di 150vh */
        .hero-section {
            position: relative;
            height: 150vh; /* Altezza: 1.5 volte lo schermo */
            width: 100%;
            /* Immagine di sfondo */
            background-image: url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            
            /* Flexbox per centrare il testo */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 4. Il trucco della sfumatura (Fade to White) */
        .hero-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%; /* L'altezza della sfumatura */
            /* Gradiente da Trasparente a Bianco Solido (#ffffff) */
            background: linear-gradient(to bottom, transparent, #1D2824);
            pointer-events: none; 
        }

        /* Stile del testo sopra l'immagine */
        .hero-text {
            color: white;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 1;
            padding: 20px;
            margin-top: -20vh; /* Lo sposto leggermente in su */
        }

        /* Menu a tendina personalizzato */
        .dropdown-menu {
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 12px;
            right: 0; 
            left: auto; /* Forza l'apertura verso sinistra */
        }
    </style>
</head>
<body>

    <nav class="navbar fixed-top navbar-custom navbar-dark">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            
            <a class="navbar-brand fw-bold fs-3" href="#">
                <img src="Asset_EdenLeaf/Logo.svg" alt="Logo" style="height: 40px; width: auto;">
            </a>

            <div class="d-flex align-items-center gap-2">
                
                <button class="btn btn-primary rounded-pill px-3 fw-bold shadow-sm">
                    PRENOTA
                </button>

                <div class="dropdown">
                    <button class="btn btn-light rounded-circle shadow-sm d-flex align-items-center justify-content-center" 
                            type="button" 
                            data-bs-toggle="dropdown" 
                            aria-expanded="false" 
                            style="width: 40px; height: 40px;">
                        <i class="bi bi-list fs-5 text-dark"></i>
                    </button>
                    
                    <ul class="dropdown-menu dropdown-menu-end mt-3 p-2">
                        <li><a class="dropdown-item rounded-2 p-2" href="#">🏠 Home</a></li>
                        <li><a class="dropdown-item rounded-2 p-2" href="#">🚀 Prodotti</a></li>
                        <li><a class="dropdown-item rounded-2 p-2" href="#">ℹ️ Chi siamo</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item rounded-2 p-2 text-danger" href="#">Logout</a></li>
                    </ul>
                </div>

            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="hero-text">
            <h1 class="display-3 fw-bold">Esplora</h1>
            <p class="lead fs-4">Scorri verso il basso...</p>
        </div>
    </header>

    <section class="container py-5" style="background-color: #1D2824;">
        <div class="row">
            <div class="col-12 text-center">
                <small class="text-uppercase text-primary fw-bold tracking-wide">Transizione</small>
                <h2 class="display-6 fw-bold mt-2">Continuità perfetta</h2>
                <p class="text-muted mt-3 lead">
                    L'immagine sopra sfuma dolcemente nel bianco di questa sezione senza linee di taglio.
                </p>
                
                <div class="card mt-4 border-0 shadow-lg rounded-4 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=600&q=80" class="card-img-top" alt="...">
                    <div class="card-body p-4 text-start">
                        <h5 class="card-title fw-bold">Contenuto successivo</h5>
                        <p class="card-text text-muted">Qui prosegue la tua app mobile.</p>
                        <a href="#" class="btn btn-dark w-100 rounded-pill">Dettagli</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
